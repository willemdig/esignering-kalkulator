<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eSignering – Kalkulator</title>
  <style>
    :root {
      --gap: 14px;
      --radius: 12px;
      --border: #d7dbe0;
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #f6f7f9;
      color: #111;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 18px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
    }
    header p {
      margin: 6px 0 0;
      color: #444;
      font-size: 13px;
    }
    main {
      max-width: 980px;
      margin: 18px auto;
      padding: 0 16px 40px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
      margin-bottom: 16px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    input[type="number"], select {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
    }
    input[type="checkbox"] {
      transform: scale(1.2);
    }
    .advanced {
      display: none;
      margin-top: 20px;
    }
    .advanced.active {
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <h1>eSignering – Kalkulator</h1>
    <p class="muted">Estimerer tidsgevinster og nettoeffekt ved overgang til eSignering.</p>
  </header>

  <main>
    <section class="card">
      <h2>Ekvivalent tidsgevinst per år</h2>
      <form id="calculatorForm">
        <label>
          Antall dokumenter per år:
          <input type="number" id="docsPerYear" value="2500" />
        </label>
        <label>
          Gjennomsnittlig signatarer per dokument:
          <input type="number" id="signersPerDocSimple" value="2" />
        </label>
        <label>
          Estimert gevinst per signatur (kr):
          <input type="number" id="gainPerSignature" value="65" />
        </label>
        <div class="advanced" id="advancedCalculator">
          <label>
            Gjennomsnittlig antall signatarer per dokument:
            <select id="signersAvg">
              <option value="1" selected>1</option>
              <option value="2">2</option>
              <option value="3">3+</option>
            </select>
          </label>
          <label>
            Kostnad per elektronisk signatur (kr):
            <input type="number" id="eSignCostPerSignature" value="4.41" />
          </label>
          <label>
            Kostnad per manuell signatur (kr):
            <input type="number" id="manualCostPerSignature" value="65" />
          </label>
          <label>
            Gevinst per signatur (kr):
            <input type="number" id="netGainPerSignature" value="65" />
          </label>
        </div>
        <label>
          <input type="checkbox" id="toggleAdvanced" />
          Vis avansert kalkulator
        </label>
        <p id="result"></p>
      </form>
    </section>
  </main>

  <script>
    const docsPerYearInput = document.getElementById('docsPerYear');
    const signersPerDocSimpleInput = document.getElementById('signersPerDocSimple');
    const gainPerSignatureInput = document.getElementById('gainPerSignature');
    const toggleAdvanced = document.getElementById('toggleAdvanced');
    const advancedCalculator = document.getElementById('advancedCalculator');
    const result = document.getElementById('result');

    const signersAvgInput = document.getElementById('signersAvg');
    const eSignCostInput = document.getElementById('eSignCostPerSignature');
    const manualCostInput = document.getElementById('manualCostPerSignature');
    const netGainInput = document.getElementById('netGainPerSignature');

    toggleAdvanced.addEventListener('change', () => {
      advancedCalculator.classList.toggle('active', toggleAdvanced.checked);
      calculate();
    });

    [docsPerYearInput, signersPerDocSimpleInput, gainPerSignatureInput, signersAvgInput, eSignCostInput, manualCostInput, netGainInput].forEach(input => {
      input.addEventListener('input', calculate);
    });

    function calculate() {
      const docsPerYear = parseFloat(docsPerYearInput.value);

      if (toggleAdvanced.checked) {
        const signersAvg = parseFloat(signersAvgInput.value);
        const eSignCost = parseFloat(eSignCostInput.value);
        const manualCost = parseFloat(manualCostInput.value);
        const netGain = parseFloat(netGainInput.value);

        if (!isNaN(docsPerYear) && !isNaN(signersAvg) && !isNaN(eSignCost) && !isNaN(manualCost) && !isNaN(netGain)) {
          const totalGain = docsPerYear * signersAvg * (manualCost - eSignCost) + docsPerYear * netGain;
          result.textContent = `Total årlig gevinst: ${totalGain.toFixed(2)} kr`;
        } else {
          result.textContent = '';
        }
      } else {
        const signersPerDoc = parseFloat(signersPerDocSimpleInput.value);
        const gainPerSig = parseFloat(gainPerSignatureInput.value);

        if (!isNaN(docsPerYear) && !isNaN(signersPerDoc) && !isNaN(gainPerSig)) {
          const totalGain = docsPerYear * signersPerDoc * gainPerSig;
          result.textContent = `Total årlig gevinst: ${totalGain.toFixed(2)} kr`;
        } else {
          result.textContent = '';
        }
      }
    }

    calculate();
  </script>
</body>
</html>
